name: infra-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**
      - .azuredevops/pipelines/infra.yml

pr:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**

parameters:
  - name: client
    type: string
    default: acme
    values: [acme, beta]

variables:
  - group: owui-${{ parameters.client }}   # holds ARM_CLIENT_ID, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
  - name: tfVersion
    value: 1.9.8
  - name: stackDir
    value: terraform/stacks/openwebui

stages:
  - stage: Validate
    displayName: Plan + scan
    jobs:
      - job: plan
        pool:
          name: Default
        strategy:
          matrix:
            dev:  { envName: dev }
            test: { envName: test }
            prod: { envName: prod }
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              curl -fsSL "https://releases.hashicorp.com/terraform/$(tfVersion)/terraform_$(tfVersion)_linux_amd64.zip" -o tf.zip
              sudo unzip -o tf.zip -d /usr/local/bin/
              terraform -version
            displayName: Install Terraform $(tfVersion)

          - script: |
              set -euo pipefail
              command -v checkov >/dev/null || brew install checkov
              checkov --version
            displayName: Install checkov

          - script: |
              cd $(stackDir)
              terraform fmt -check -recursive ../..
              terraform init -backend=false
              terraform validate
            displayName: fmt + validate

          - script: |
              cd $(stackDir)
              terraform test -verbose
            displayName: terraform test (feature-flag gating)

          - script: |
              # CKV_AZURE_206 misflags ZRS (Zone-Redundant Storage) as "no replication"
              # — ZRS *is* replication (across AZs). Known checkov bug.
              checkov -d terraform --framework terraform --quiet \
                --soft-fail-on MEDIUM \
                --skip-check CKV_AZURE_206
            displayName: checkov

          - task: AzureCLI@2
            displayName: terraform plan ($(envName))
            inputs:
              azureSubscription: sc-owui-${{ parameters.client }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                export ARM_USE_AZUREAD=true
                export ENVIRONMENT=$(envName)
                cd $(stackDir)
                envsubst < ../../envs/${{ parameters.client }}/backend.hcl > backend.generated.hcl
                terraform init -backend-config=backend.generated.hcl
                terraform plan \
                  -var-file=../../envs/${{ parameters.client }}/$(envName).tfvars \
                  -out=tfplan.$(envName) \
                  -detailed-exitcode || EXIT=$?
                terraform show -no-color tfplan.$(envName) > tfplan.$(envName).txt
                [[ "${EXIT:-0}" == "1" ]] && exit 1 || true

          - publish: $(stackDir)/tfplan.$(envName)
            artifact: tfplan-$(envName)

          - publish: $(stackDir)/tfplan.$(envName).txt
            artifact: tfplan-$(envName)-text

  - stage: Apply_Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: apply_dev
        environment: owui-${{ parameters.client }}-dev
        pool:
          name: Default
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: dev
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)

  - stage: Apply_Test
    dependsOn: Apply_Dev
    jobs:
      - deployment: apply_test
        environment: owui-${{ parameters.client }}-test
        pool:
          name: Default
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: test
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)

  - stage: Apply_Prod
    dependsOn: Apply_Test
    jobs:
      - deployment: apply_prod
        environment: owui-${{ parameters.client }}-prod
        pool:
          name: Default
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: prod
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)
