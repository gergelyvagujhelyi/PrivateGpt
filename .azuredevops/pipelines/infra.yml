name: infra-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**
      - .azuredevops/pipelines/infra.yml

pr:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**

parameters:
  - name: client
    type: string
    default: acme
    values: [acme]

variables:
  - group: owui-${{ parameters.client }}   # holds ARM_CLIENT_ID, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
  - name: tfVersion
    value: 1.9.8
  - name: stackDir
    value: terraform/stacks/openwebui

stages:
  - stage: Validate
    displayName: Plan + scan
    jobs:
      - job: plan
        pool: { vmImage: ubuntu-latest }
        strategy:
          matrix:
            dev:  { envName: dev }
            test: { envName: test }
            prod: { envName: prod }
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(tfVersion)

          - script: |
              curl -sSfL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash -s -- -b /usr/local/bin
              pip install --quiet checkov
            displayName: Install tflint/checkov

          - script: |
              cd $(stackDir)
              terraform fmt -check -recursive ../..
              terraform init -backend=false
              terraform validate
            displayName: fmt + validate

          - script: |
              checkov -d terraform --framework terraform --quiet --soft-fail-on MEDIUM
            displayName: checkov

          - task: AzureCLI@2
            displayName: terraform plan ($(envName))
            inputs:
              azureSubscription: sc-owui-${{ parameters.client }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                export ARM_USE_AZUREAD=true
                export ENVIRONMENT=$(envName)
                cd $(stackDir)
                envsubst < ../../envs/${{ parameters.client }}/backend.hcl > backend.generated.hcl
                terraform init -backend-config=backend.generated.hcl
                terraform plan \
                  -var-file=../../envs/${{ parameters.client }}/$(envName).tfvars \
                  -out=tfplan.$(envName) \
                  -detailed-exitcode || EXIT=$?
                terraform show -no-color tfplan.$(envName) > tfplan.$(envName).txt
                [[ "${EXIT:-0}" == "1" ]] && exit 1 || true

          - publish: $(stackDir)/tfplan.$(envName)
            artifact: tfplan-$(envName)

          - publish: $(stackDir)/tfplan.$(envName).txt
            artifact: tfplan-$(envName)-text

  - stage: Apply_Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: apply_dev
        environment: owui-${{ parameters.client }}-dev
        pool: { vmImage: ubuntu-latest }
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: dev
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)

  - stage: Apply_Test
    dependsOn: Apply_Dev
    jobs:
      - deployment: apply_test
        environment: owui-${{ parameters.client }}-test
        pool: { vmImage: ubuntu-latest }
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: test
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)

  - stage: Apply_Prod
    dependsOn: Apply_Test
    jobs:
      - deployment: apply_prod
        environment: owui-${{ parameters.client }}-prod
        pool: { vmImage: ubuntu-latest }
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: prod
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)
