name: infra-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**
      - .azuredevops/pipelines/infra.yml
      - .azuredevops/pipelines/templates/**

pr:
  branches:
    include: [main]
  paths:
    include:
      - terraform/**
      - .azuredevops/pipelines/infra.yml
      - .azuredevops/pipelines/templates/**

parameters:
  - name: client
    type: string
    default: kdemo
    values: [kdemo, kompose, acme, beta]
  - name: service_connection
    displayName: ADO service connection (blank → sc-owui-<client>)
    type: string
    default: ''
  - name: include_test
    displayName: Also plan + apply test env
    type: boolean
    default: false
  - name: include_prod
    displayName: Also plan + apply prod env
    type: boolean
    default: false

variables:
  - group: owui-${{ parameters.client }}   # holds ARM_CLIENT_ID, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
  - name: tfVersion
    value: 1.9.8
  - name: stackDir
    value: terraform/stacks/openwebui

stages:
  - stage: Validate
    displayName: Plan + scan
    jobs:
      - job: plan
        pool:
          name: Default
        strategy:
          matrix:
            dev: { envName: dev }
            ${{ if eq(parameters.include_test, true) }}:
              test: { envName: test }
            ${{ if eq(parameters.include_prod, true) }}:
              prod: { envName: prod }
        steps:
          - checkout: self

          - script: |
              set -euo pipefail
              curl -fsSL "https://releases.hashicorp.com/terraform/$(tfVersion)/terraform_$(tfVersion)_linux_amd64.zip" -o tf.zip
              sudo unzip -o tf.zip -d /usr/local/bin/
              terraform -version
            displayName: Install Terraform $(tfVersion)

          - script: |
              set -euo pipefail
              # Self-hosted macOS agent: brew is available and preferred.
              # If relocating the pipeline to Microsoft-hosted ubuntu-latest later,
              # swap this for: pipx install checkov
              command -v checkov >/dev/null || brew install checkov
              checkov --version
            displayName: Install checkov

          - script: |
              cd $(stackDir)
              terraform fmt -check -recursive ../..
              terraform init -backend=false
              terraform validate
            displayName: fmt + validate

          - script: |
              cd $(stackDir)
              terraform test -verbose
            displayName: terraform test (feature-flag gating)

          - script: |
              # Advisory: findings print in the log for review, never fail the pipeline.
              # Subscription-level Azure Policy + Defender for Cloud are the real gates;
              # checkov here is a prompt to PR-review authors, not a deploy blocker.
              checkov -d terraform --framework terraform --quiet --soft-fail
            displayName: checkov (advisory)

          - task: AzureCLI@2
            displayName: terraform plan ($(envName))
            inputs:
              azureSubscription: ${{ coalesce(parameters.service_connection, format('sc-owui-{0}', parameters.client)) }}
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail
                # Map ADO WIF creds → ARM_* so terraform's azurerm backend can use OIDC.
                export ARM_USE_OIDC=true
                export ARM_USE_AZUREAD=true
                export ARM_OIDC_TOKEN="$idToken"
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                export ENVIRONMENT=$(envName)
                cd $(stackDir)
                envsubst < ../../envs/${{ parameters.client }}/backend.hcl > backend.generated.hcl
                terraform init -backend-config=backend.generated.hcl
                # Plan here is a gate only — diff is visible in job logs.
                # The Apply stage re-plans + applies in one shot, avoiding the
                # stale-plan and duplicate-artifact failures that split stages
                # produced when state moved between plan and apply, or when a
                # single build republished a static artifact name on retry.
                terraform plan \
                  -var-file=../../envs/${{ parameters.client }}/$(envName).tfvars \
                  -detailed-exitcode || EXIT=$?
                [[ "${EXIT:-0}" == "1" ]] && exit 1 || true

  - stage: Apply_Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: apply_dev
        environment: owui-${{ parameters.client }}-dev
        pool:
          name: Default
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    envName: dev
                    client: ${{ parameters.client }}
                    tfVersion: $(tfVersion)
                    stackDir: $(stackDir)
                    service_connection: ${{ parameters.service_connection }}

  - ${{ if eq(parameters.include_test, true) }}:
    - stage: Apply_Test
      dependsOn: Apply_Dev
      jobs:
        - deployment: apply_test
          environment: owui-${{ parameters.client }}-test
          pool:
            name: Default
          strategy:
            runOnce:
              deploy:
                steps:
                  - template: templates/terraform-apply.yml
                    parameters:
                      envName: test
                      client: ${{ parameters.client }}
                      tfVersion: $(tfVersion)
                      stackDir: $(stackDir)
                      service_connection: ${{ parameters.service_connection }}

  - ${{ if eq(parameters.include_prod, true) }}:
    - stage: Apply_Prod
      dependsOn:
        - Apply_Dev
        - ${{ if eq(parameters.include_test, true) }}:
          - Apply_Test
      jobs:
        - deployment: apply_prod
          environment: owui-${{ parameters.client }}-prod
          pool:
            name: Default
          strategy:
            runOnce:
              deploy:
                steps:
                  - template: templates/terraform-apply.yml
                    parameters:
                      envName: prod
                      client: ${{ parameters.client }}
                      tfVersion: $(tfVersion)
                      stackDir: $(stackDir)
                      service_connection: ${{ parameters.service_connection }}
