parameters:
  - name: envName
    type: string
  - name: client
    type: string
  - name: sha
    type: string
  - name: acrName
    type: string
  - name: canary
    type: boolean
    default: false
  - name: service_connection
    type: string
    default: ''

steps:
  - checkout: self

  - task: AzureCLI@2
    displayName: Update Container Apps (${{ parameters.envName }})
    inputs:
      azureSubscription: ${{ coalesce(parameters.service_connection, format('sc-owui-{0}', parameters.client)) }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        RG="rg-owui-${{ parameters.client }}-${{ parameters.envName }}"
        PREFIX="owui-${{ parameters.client }}-${{ parameters.envName }}"
        SHA_FULL="${{ parameters.sha }}"
        # Azure caps revision name at 54 chars (app name + "--" + suffix).
        # `ca-owui-<client>-<env>-<app>` is already ~27 chars for the longest
        # app name, leaving ~25 for the suffix. Use the short SHA + still
        # collision-resistant; keep an upper bound in case of a long client name.
        SHA_SHORT="${SHA_FULL:0:12}"

        # Container Apps — core always present, admin optional (skipped silently when feature is off).
        for app in openwebui litellm admin; do
          name="ca-${PREFIX}-${app}"
          if ! az containerapp show -g "$RG" -n "$name" >/dev/null 2>&1; then
            echo "==> ${name} not present — skipping"
            continue
          fi
          image="${{ parameters.acrName }}.azurecr.io/${app}:${SHA_FULL}"
          echo "==> deploying ${name} := ${image}"

          if [[ "${{ parameters.canary }}" == "True" ]]; then
            # Create a new revision at 10% traffic, then ramp.
            az containerapp update -g "$RG" -n "$name" --image "$image" --revision-suffix "$SHA_SHORT"
            az containerapp ingress traffic set -g "$RG" -n "$name" \
              --revision-weight latest=10 \
              --revision-weight "$(az containerapp revision list -g "$RG" -n "$name" --query "[?properties.active && name!='${name}--${SHA_SHORT}'].name | [0]" -o tsv)=90"

            # Smoke probe
            fqdn=$(az containerapp show -g "$RG" -n "$name" --query properties.configuration.ingress.fqdn -o tsv)
            for i in {1..30}; do
              if curl -fsS "https://${fqdn}/health"; then break; fi
              sleep 5
            done

            az containerapp ingress traffic set -g "$RG" -n "$name" --revision-weight latest=100
          else
            az containerapp update -g "$RG" -n "$name" --image "$image" --revision-suffix "$SHA_SHORT"
          fi
        done

        # Optional Container Apps Jobs — only update if they exist in this stack
        declare -A JOB_IMAGE=(
          [digest-daily]=digest
          [digest-weekly]=digest
          [rag-ingest]=rag
        )
        for job in "${!JOB_IMAGE[@]}"; do
          jobname="caj-${PREFIX}-${job}"
          if az containerapp job show -g "$RG" -n "$jobname" >/dev/null 2>&1; then
            image="${{ parameters.acrName }}.azurecr.io/${JOB_IMAGE[$job]}:${{ parameters.sha }}"
            echo "==> deploying job ${jobname} := ${image}"
            az containerapp job update -g "$RG" -n "$jobname" --image "$image"
          else
            echo "==> job ${jobname} not present (feature disabled) — skipping"
          fi
        done
