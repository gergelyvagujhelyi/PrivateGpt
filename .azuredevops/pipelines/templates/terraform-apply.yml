parameters:
  - name: envName
    type: string
  - name: client
    type: string
  - name: tfVersion
    type: string
  - name: stackDir
    type: string
  - name: service_connection
    type: string
    default: ''


steps:
  - checkout: self

  - script: |
      set -euo pipefail
      curl -fsSL "https://releases.hashicorp.com/terraform/${{ parameters.tfVersion }}/terraform_${{ parameters.tfVersion }}_linux_amd64.zip" -o tf.zip
      sudo unzip -o tf.zip -d /usr/local/bin/
      terraform -version
    displayName: Install Terraform ${{ parameters.tfVersion }}

  - task: AzureCLI@2
    displayName: terraform plan + apply (${{ parameters.envName }})
    inputs:
      azureSubscription: ${{ coalesce(parameters.service_connection, format('sc-owui-{0}', parameters.client)) }}
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        set -euo pipefail
        # Map ADO WIF creds → ARM_* so terraform's azurerm backend can use OIDC.
        export ARM_USE_OIDC=true
        export ARM_USE_AZUREAD=true
        export ARM_OIDC_TOKEN="$idToken"
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

        export ENVIRONMENT=${{ parameters.envName }}
        cd ${{ parameters.stackDir }}
        envsubst < ../../envs/${{ parameters.client }}/backend.hcl > backend.generated.hcl
        terraform init -backend-config=backend.generated.hcl
        terraform plan \
          -var-file=../../envs/${{ parameters.client }}/${{ parameters.envName }}.tfvars \
          -out=tfplan
        terraform apply -auto-approve tfplan
