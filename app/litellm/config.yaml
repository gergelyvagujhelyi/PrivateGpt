model_list:
- model_name: claude-sonnet-4-5
  litellm_params:
    model: azure_ai/claude-sonnet-4-5
    api_base: os.environ/ENDPOINT_CLAUDE_SONNET_4_5
    api_key: os.environ/KEY_CLAUDE_SONNET_4_5
- model_name: claude-haiku-4-5
  litellm_params:
    model: azure_ai/claude-haiku-4-5
    api_base: os.environ/ENDPOINT_CLAUDE_HAIKU_4_5
    api_key: os.environ/KEY_CLAUDE_HAIKU_4_5
- model_name: gpt-4o
  litellm_params:
    model: azure/gpt-4o
    api_base: os.environ/AZURE_API_BASE
    api_key: os.environ/AZURE_API_KEY
    api_version: os.environ/AZURE_API_VERSION
- model_name: gpt-4o-mini
  litellm_params:
    model: azure/gpt-4o-mini
    api_base: os.environ/AZURE_API_BASE
    api_key: os.environ/AZURE_API_KEY
    api_version: os.environ/AZURE_API_VERSION
- model_name: text-embedding-3-large
  litellm_params:
    model: azure/text-embedding-3-large
    api_base: os.environ/AZURE_API_BASE
    api_key: os.environ/AZURE_API_KEY
    api_version: os.environ/AZURE_API_VERSION
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  allowed_fails: 3
  cooldown_time: 30
litellm_settings:
  drop_params: true
  success_callback:
  - langfuse
  failure_callback:
  - langfuse
  cache: true
  cache_params:
    type: local
    ttl: 600
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  enforce_user_param: true
