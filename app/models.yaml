# Declarative model catalogue — single source of truth.
# Changes drive:
#   1. Azure AI Foundry deployments (terraform var foundry_deployments)
#   2. LiteLLM router config (rendered by scripts/render_litellm_config.py)

models:
  - name: claude-sonnet-4-5
    provider: anthropic
    version: "1"
    purpose: chat
    exposed_as: claude-sonnet-4-5
    content_safety_policy: Microsoft.DefaultV2

  - name: claude-haiku-4-5
    provider: anthropic
    version: "1"
    purpose: chat
    exposed_as: claude-haiku-4-5
    content_safety_policy: Microsoft.DefaultV2

  - name: text-embedding-3-large
    provider: openai
    version: "1"
    sku_name: Standard
    capacity: 50
    purpose: embedding
    exposed_as: text-embedding-3-large
